<svg viewBox="0 0 1920 384" xmlns="http://www.w3.org/2000/svg">
  <!-- ===== cardboard background ===== -->
  <rect width="1920" height="384" fill="#cdb083"/>
  <rect x="8" y="8" width="1904" height="368" rx="28" fill="none" stroke="#b8935f" stroke-width="12"/>
  <!-- faint kraft flecks -->
  <g fill="#b8935f" opacity="0.5">
    <ellipse cx="120" cy="60" rx="5" ry="3" transform="rotate(-20 120 60)"/>
    <ellipse cx="70" cy="300" rx="5" ry="3" transform="rotate(-20 70 300)"/>
    <ellipse cx="1850" cy="90" rx="5" ry="3" transform="rotate(-20 1850 90)"/>
    <ellipse cx="1820" cy="320" rx="5" ry="3" transform="rotate(-20 1820 320)"/>
    <ellipse cx="960" cy="40" rx="5" ry="3" transform="rotate(-20 960 40)"/>
  </g>
  <!-- confetti note dots (subtle palette tie-in) -->
  <g opacity="0.45">
    <ellipse cx="70" cy="120" rx="11" ry="8" fill="#e2574c" transform="rotate(-20 70 120)"/>
    <ellipse cx="60" cy="240" rx="11" ry="8" fill="#6f42ab" transform="rotate(-20 60 240)"/>
    <ellipse cx="1855" cy="180" rx="11" ry="8" fill="#f2b705" transform="rotate(-20 1855 180)"/>
    <ellipse cx="1865" cy="290" rx="11" ry="8" fill="#3fb0ac" transform="rotate(-20 1865 290)"/>
