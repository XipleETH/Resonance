    <ellipse cx="850" cy="55" rx="11" ry="8" fill="#ef8a3c" transform="rotate(-20 850 55)"/>
  </g>

  <!-- ===== JAMPAD wordmark (uppercase musical notation) ===== -->
  <g transform="translate(84,60) scale(1.02,1.26)">
    <g transform="translate(6,2)" fill="none" stroke="#3a2f22" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <g><line x1="46" y1="46" x2="96" y2="42" stroke="#e2574c" stroke-width="9"/><line x1="84" y1="44" x2="84" y2="110"/><path d="M84 110 C84 130 62 132 50 120"/><ellipse cx="48" cy="122" rx="16" ry="11" fill="#e2574c" stroke="none" transform="rotate(-20 48 122)"/></g>
      <g><line x1="132" y1="130" x2="166" y2="48"/><line x1="204" y1="130" x2="170" y2="48"/><line x1="150" y1="92" x2="186" y2="92" stroke="#3fb0ac" stroke-width="7"/><ellipse cx="130" cy="132" rx="15" ry="10" fill="#3fb0ac" stroke="none" transform="rotate(-20 130 132)"/><ellipse cx="206" cy="132" rx="15" ry="10" fill="#3fb0ac" stroke="none" transform="rotate(-20 206 132)"/></g>
      <g><line x1="232" y1="130" x2="232" y2="48"/><line x1="320" y1="130" x2="320" y2="48"/><path d="M232 50 L276 98 L320 50"/><ellipse cx="232" cy="132" rx="14" ry="10" fill="#f2b705" stroke="none" transform="rotate(-20 232 132)"/><ellipse cx="320" cy="132" rx="14" ry="10" fill="#f2b705" stroke="none" transform="rotate(-20 320 132)"/></g>
      <g><line x1="350" y1="130" x2="350" y2="46"/><path d="M350 50 C398 44 412 86 372 94 C362 96 354 92 350 88" fill="#6f42ab" stroke-width="6"/><ellipse cx="350" cy="132" rx="15" ry="10" fill="#6f42ab" stroke="none" transform="rotate(-20 350 132)"/></g>
      <g><line x1="446" y1="130" x2="480" y2="48"/><line x1="518" y1="130" x2="484" y2="48"/><line x1="464" y1="92" x2="500" y2="92" stroke="#ef8a3c" stroke-width="7"/><ellipse cx="444" cy="132" rx="15" ry="10" fill="#ef8a3c" stroke="none" transform="rotate(-20 444 132)"/><ellipse cx="516" cy="132" rx="15" ry="10" fill="#5bb974" stroke="none" transform="rotate(-20 516 132)"/></g>
      <g><line x1="548" y1="130" x2="548" y2="46"/><path d="M548 48 C612 46 628 128 548 126" fill="#5bb974" stroke="#3a2f22" stroke-width="6"/><ellipse cx="548" cy="132" rx="15" ry="10" fill="#5bb974" stroke="none" transform="rotate(-20 548 132)"/></g>
    </g>
  </g>
  <!-- tagline -->
  <text x="132" y="300" font-family="Gochi Hand, sans-serif" font-size="34" fill="#6b5b45">one loop &#183; the whole subreddit</text>

  <!-- ===== edit control panel ===== -->
  <g transform="translate(895,84)">
    <rect x="6" y="14" width="920" height="210" rx="40" fill="#3a2f22" opacity="0.15"/>
    <rect x="0" y="0" width="920" height="210" rx="40" fill="#a9ba79" stroke="#7c8a49" stroke-width="7"/>
    <rect x="14" y="14" width="892" height="96" rx="30" fill="#b6c489" opacity="0.55"/>

    <!-- G1: wave-shape toggle (sine | square) -->
    <rect x="63" y="46" width="150" height="118" rx="20" fill="#efe3c3" stroke="#3a2f22" stroke-width="5"/>
    <line x1="138" y1="60" x2="138" y2="150" stroke="#3a2f22" stroke-width="3" opacity="0.4"/>
    <path d="M78 105 Q90 83 101 105 T124 105" fill="none" stroke="#3a2f22" stroke-width="7" stroke-linecap="round"/>
    <path d="M150 128 L150 96 L166 96 L166 128 L182 128 L182 96 L198 96 L198 118" fill="none" stroke="#3a2f22" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- G2: wave preset (yellow) -->
    <rect x="229" y="46" width="130" height="118" rx="20" fill="#efe3c3" stroke="#3a2f22" stroke-width="5"/>
    <path d="M244 108 Q257 80 270 108 T296 108 T322 108 T348 108" fill="none" stroke="#f2b705" stroke-width="9" stroke-linecap="round"/>

    <!-- G3: pitch/volume disc -->
    <rect x="375" y="30" width="190" height="150" rx="42" fill="#efe3c3" stroke="#3a2f22" stroke-width="6"/>
    <rect x="389" y="44" width="162" height="122" rx="32" fill="none" stroke="#3a2f22" stroke-width="2" opacity="0.3"/>
    <path d="M470 46 L456 66 L484 66 Z" fill="#3fb0ac" stroke="#3a2f22" stroke-width="3" stroke-linejoin="round"/>
    <path d="M470 164 L456 144 L484 144 Z" fill="#3fb0ac" stroke="#3a2f22" stroke-width="3" stroke-linejoin="round"/>
    <path d="M392 105 L412 91 L412 119 Z" fill="#5bb974" stroke="#3a2f22" stroke-width="3" stroke-linejoin="round"/>
    <path d="M548 105 L528 91 L528 119 Z" fill="#5bb974" stroke="#3a2f22" stroke-width="3" stroke-linejoin="round"/>
    <text x="470" y="118" font-family="Gochi Hand, sans-serif" font-size="40" fill="#3a2f22" text-anchor="middle">1-4</text>

    <!-- G4: ratchet note x2 -->
    <rect x="581" y="46" width="150" height="118" rx="20" fill="#efe3c3" stroke="#3a2f22" stroke-width="5"/>
    <ellipse cx="600" cy="140" rx="11" ry="8" fill="#3a2f22" transform="rotate(-20 600 140)"/>
    <ellipse cx="632" cy="133" rx="11" ry="8" fill="#3a2f22" transform="rotate(-20 632 133)"/>
    <line x1="610" y1="137" x2="610" y2="92" stroke="#3a2f22" stroke-width="6" stroke-linecap="round"/>
    <line x1="642" y1="130" x2="642" y2="86" stroke="#3a2f22" stroke-width="6" stroke-linecap="round"/>
    <path d="M607 92 L646 84" stroke="#3a2f22" stroke-width="9" stroke-linecap="round"/>
    <text x="700" y="122" font-family="Gochi Hand, sans-serif" font-size="46" fill="#3a2f22" text-anchor="middle">x2</text>

    <!-- G5: reset -->
    <rect x="747" y="46" width="110" height="118" rx="20" fill="#e79b86" stroke="#3a2f22" stroke-width="5"/>
    <path d="M802 80 A26 26 0 1 1 780 94" fill="none" stroke="#3a2f22" stroke-width="8" stroke-linecap="round"/>
    <path d="M802 68 L791 82 L809 85 Z" fill="#3a2f22" stroke="#3a2f22" stroke-width="2" stroke-linejoin="round"/>
  </g>
</svg>
